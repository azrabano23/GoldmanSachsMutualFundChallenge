<div class="page">
  <div class="card">
    <h1>Mutual Fund Calculator</h1>

    <div class="form-group">
      <label for="fund">Fund</label>
      <select id="fund" [(ngModel)]="selectedFund">
        <option value="VSMPX">VSMPX — Vanguard Total Stock Market Index</option>
        <option value="FXAIX">FXAIX — Fidelity 500 Index Fund</option>
        <option value="VFIAX">VFIAX — Vanguard 500 Index Fund</option>
        <option value="VTSAX">VTSAX — Vanguard Total Stock Market Index</option>
        <option value="VGTSX">VGTSX — Vanguard Total International Stock</option>
      </select>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="amount">Initial Investment ($)</label>
        <input id="amount" type="number" [(ngModel)]="amount" placeholder="10000" min="0" />
      </div>
      <div class="form-group">
        <label for="years">Time Horizon (years)</label>
        <input id="years" type="number" [(ngModel)]="years" placeholder="10" min="0" />
      </div>
    </div>

    <button (click)="calculate()" [disabled]="loading">
      {{ loading ? 'Calculating…' : 'Calculate' }}
    </button>

    @if (error) {
      <div class="error">{{ error }}</div>
    }

    @if (result !== null) {
      <div class="result">
        <span class="result-label">Projected Value</span>
        <span class="result-value">${{ result | number:'1.2-2' }}</span>
        <span class="result-meta">{{ selectedFund }} &middot; 10% annual rate &middot; {{ years }} yr(s)</span>
      </div>
    }
  </div>
</div>
