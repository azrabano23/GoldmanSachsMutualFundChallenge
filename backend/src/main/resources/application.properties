spring.application.name=backend

# ─── H2 In-Memory Database ────────────────────────────────────────────────────
# Development: data lives in memory for the session.
# To use Google Cloud SQL (production), replace the three lines below with:
#   spring.datasource.url=jdbc:postgresql://<HOST>:5432/<DB>
#   spring.datasource.username=<USER>
#   spring.datasource.password=<PASSWORD>
#   spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.datasource.url=jdbc:h2:mem:mfunddb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
# H2 browser console: http://localhost:8080/h2-console  (JDBC URL: jdbc:h2:mem:mfunddb)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ─── Swagger / OpenAPI ────────────────────────────────────────────────────────
# Interactive API explorer: http://localhost:8080/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
